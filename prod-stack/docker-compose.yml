services:
  traefik:
    image: traefik:v3
    container_name: ai-demo-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@atteo.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - prod-stack

  postgres:
    image: postgres:17
    container_name: ai-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aidemo
      POSTGRES_USER: aidemo
      POSTGRES_PASSWORD: aidemo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prod-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidemo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ai-demo-backend
    container_name: ai-demo-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aidemo
      DB_USER: aidemo
      DB_PASSWORD: aidemo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prod-stack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`ai-demo.atteo.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  frontend:
    image: ai-demo-frontend
    container_name: ai-demo-frontend
    restart: unless-stopped
    networks:
      - prod-stack
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`ai-demo.atteo.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  prod-stack:
    driver: bridge

volumes:
  postgres_data:
  letsencrypt:
